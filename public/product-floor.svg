<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f1525"/><stop offset="100%" stop-color="#0a0e1a"/></linearGradient>
<linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e2840"/><stop offset="100%" stop-color="#141a2e"/></linearGradient>
<linearGradient id="perforated" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0c1122"/><stop offset="100%" stop-color="#060a14"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="1.5"/></filter>
<filter id="bigGlow"><feGaussianBlur stdDeviation="20"/></filter>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>

<!-- Ambient blue glow from below -->
<ellipse cx="300" cy="350" rx="350" ry="100" fill="#0088ff" opacity="0.15" filter="url(#bigGlow)"/>

<!-- Raised floor perspective - grid of tiles -->
<!-- Back row (small, far) -->
<g>
  <!-- Row 1 (far back) -->
  <rect x="165" y="100" width="55" height="35" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="222" y="100" width="55" height="35" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="279" y="100" width="55" height="35" fill="url(#perforated)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="336" y="100" width="55" height="35" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="393" y="100" width="55" height="35" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>

  <!-- Perforated tile holes (row 1, middle) -->
  <g fill="#0088ff" opacity="0.4" filter="url(#glow)">
    <circle cx="289" cy="110" r="1"/><circle cx="297" cy="110" r="1"/><circle cx="305" cy="110" r="1"/>
    <circle cx="313" cy="110" r="1"/><circle cx="321" cy="110" r="1"/><circle cx="293" cy="118" r="1"/>
    <circle cx="301" cy="118" r="1"/><circle cx="309" cy="118" r="1"/><circle cx="317" cy="118" r="1"/>
    <circle cx="289" cy="126" r="1"/><circle cx="297" cy="126" r="1"/><circle cx="305" cy="126" r="1"/>
    <circle cx="313" cy="126" r="1"/><circle cx="321" cy="126" r="1"/>
  </g>
</g>

<g>
  <!-- Row 2 -->
  <rect x="145" y="138" width="65" height="42" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="212" y="138" width="65" height="42" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="279" y="138" width="65" height="42" fill="url(#perforated)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="346" y="138" width="65" height="42" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>
  <rect x="413" y="138" width="65" height="42" fill="url(#tile)" stroke="#3a4868" stroke-width="0.5" rx="1"/>

  <g fill="#0088ff" opacity="0.5" filter="url(#glow)">
    <circle cx="288" cy="148" r="1.2"/><circle cx="298" cy="148" r="1.2"/><circle cx="308" cy="148" r="1.2"/>
    <circle cx="318" cy="148" r="1.2"/><circle cx="328" cy="148" r="1.2"/><circle cx="293" cy="158" r="1.2"/>
    <circle cx="303" cy="158" r="1.2"/><circle cx="313" cy="158" r="1.2"/><circle cx="323" cy="158" r="1.2"/>
    <circle cx="288" cy="168" r="1.2"/><circle cx="298" cy="168" r="1.2"/><circle cx="308" cy="168" r="1.2"/>
    <circle cx="318" cy="168" r="1.2"/><circle cx="328" cy="168" r="1.2"/>
  </g>
</g>

<g>
  <!-- Row 3 -->
  <rect x="120" y="183" width="80" height="52" fill="url(#tile)" stroke="#3a4868" stroke-width="0.7" rx="1"/>
  <rect x="202" y="183" width="80" height="52" fill="url(#tile)" stroke="#3a4868" stroke-width="0.7" rx="1"/>
  <rect x="284" y="183" width="80" height="52" fill="url(#perforated)" stroke="#3a4868" stroke-width="0.7" rx="1"/>
  <rect x="366" y="183" width="80" height="52" fill="url(#tile)" stroke="#3a4868" stroke-width="0.7" rx="1"/>
  <rect x="448" y="183" width="80" height="52" fill="url(#tile)" stroke="#3a4868" stroke-width="0.7" rx="1"/>

  <g fill="#00aaff" opacity="0.6" filter="url(#glow)">
    <circle cx="294" cy="195" r="1.5"/><circle cx="306" cy="195" r="1.5"/><circle cx="318" cy="195" r="1.5"/>
    <circle cx="330" cy="195" r="1.5"/><circle cx="342" cy="195" r="1.5"/><circle cx="354" cy="195" r="1.5"/>
    <circle cx="300" cy="207" r="1.5"/><circle cx="312" cy="207" r="1.5"/><circle cx="324" cy="207" r="1.5"/>
    <circle cx="336" cy="207" r="1.5"/><circle cx="348" cy="207" r="1.5"/>
    <circle cx="294" cy="219" r="1.5"/><circle cx="306" cy="219" r="1.5"/><circle cx="318" cy="219" r="1.5"/>
    <circle cx="330" cy="219" r="1.5"/><circle cx="342" cy="219" r="1.5"/><circle cx="354" cy="219" r="1.5"/>
  </g>
</g>

<g>
  <!-- Row 4 (front, largest) -->
  <rect x="90" y="240" width="95" height="65" fill="url(#tile)" stroke="#3a4868" stroke-width="0.8" rx="1"/>
  <rect x="187" y="240" width="95" height="65" fill="url(#tile)" stroke="#3a4868" stroke-width="0.8" rx="1"/>
  <rect x="284" y="240" width="95" height="65" fill="url(#perforated)" stroke="#3a4868" stroke-width="0.8" rx="1"/>
  <rect x="381" y="240" width="95" height="65" fill="url(#tile)" stroke="#3a4868" stroke-width="0.8" rx="1"/>
  <rect x="478" y="240" width="95" height="65" fill="url(#tile)" stroke="#3a4868" stroke-width="0.8" rx="1"/>

  <!-- Bigger holes on front perforated tile -->
  <g fill="#00ccff" opacity="0.75" filter="url(#glow)">
    <circle cx="298" cy="254" r="2"/><circle cx="312" cy="254" r="2"/><circle cx="326" cy="254" r="2"/>
    <circle cx="340" cy="254" r="2"/><circle cx="354" cy="254" r="2"/><circle cx="368" cy="254" r="2"/>
    <circle cx="305" cy="268" r="2"/><circle cx="319" cy="268" r="2"/><circle cx="333" cy="268" r="2"/>
    <circle cx="347" cy="268" r="2"/><circle cx="361" cy="268" r="2"/>
    <circle cx="298" cy="282" r="2"/><circle cx="312" cy="282" r="2"/><circle cx="326" cy="282" r="2"/>
    <circle cx="340" cy="282" r="2"/><circle cx="354" cy="282" r="2"/><circle cx="368" cy="282" r="2"/>
    <circle cx="305" cy="296" r="2"/><circle cx="319" cy="296" r="2"/><circle cx="333" cy="296" r="2"/>
    <circle cx="347" cy="296" r="2"/><circle cx="361" cy="296" r="2"/>
  </g>
</g>

<!-- Cutaway showing underfloor (bottom) -->
<g>
  <!-- Raised floor edge/cross-section -->
  <rect x="60" y="305" width="520" height="10" fill="#2a3550" stroke="#4a5878" stroke-width="0.5"/>
  <rect x="60" y="315" width="520" height="4" fill="#1a2236"/>
  
  <!-- Support pedestals (visible below) -->
  <g fill="#4a5878">
    <rect x="98" y="319" width="3" height="35" rx="0.5"/>
    <rect x="180" y="319" width="3" height="35" rx="0.5"/>
    <rect x="260" y="319" width="3" height="35" rx="0.5"/>
    <rect x="340" y="319" width="3" height="35" rx="0.5"/>
    <rect x="420" y="319" width="3" height="35" rx="0.5"/>
    <rect x="500" y="319" width="3" height="35" rx="0.5"/>
  </g>
  
  <!-- Cables running underfloor -->
  <g stroke-width="1" fill="none" opacity="0.4">
    <path d="M 70 340 Q 200 336 330 342 T 590 340" stroke="#0066ff" filter="url(#glow)"/>
    <path d="M 70 345 Q 200 348 330 344 T 590 346" stroke="#00aaff"/>
    <path d="M 70 350 Q 200 348 330 352 T 590 348" stroke="#0088ff"/>
  </g>
  
  <!-- Concrete slab below -->
  <rect x="0" y="358" width="600" height="42" fill="#05080f"/>
</g>

<!-- Cold air rising from perforated tiles (column of light) -->
<g opacity="0.15" filter="url(#bigGlow)">
  <rect x="280" y="80" width="100" height="170" fill="#00aaff"/>
</g>

<!-- Server rack shadow silhouettes at back -->
<g opacity="0.25">
  <rect x="85" y="55" width="50" height="50" rx="1" fill="#1a2236" stroke="#2a3450" stroke-width="0.3"/>
  <rect x="140" y="55" width="50" height="50" rx="1" fill="#1a2236" stroke="#2a3450" stroke-width="0.3"/>
  <rect x="410" y="55" width="50" height="50" rx="1" fill="#1a2236" stroke="#2a3450" stroke-width="0.3"/>
  <rect x="465" y="55" width="50" height="50" rx="1" fill="#1a2236" stroke="#2a3450" stroke-width="0.3"/>
  <!-- Small LEDs on silhouettes -->
  <circle cx="128" cy="62" r="0.8" fill="#00ff88"/>
  <circle cx="183" cy="62" r="0.8" fill="#0088ff"/>
  <circle cx="453" cy="62" r="0.8" fill="#00ff88"/>
  <circle cx="508" cy="62" r="0.8" fill="#00aaff"/>
</g>
</svg>
