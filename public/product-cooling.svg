<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f1525"/><stop offset="100%" stop-color="#0a0e1a"/></linearGradient>
<linearGradient id="unit" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2a3550"/><stop offset="50%" stop-color="#3e4c70"/><stop offset="100%" stop-color="#1f2942"/></linearGradient>
<linearGradient id="cold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00aaff" stop-opacity="0.3"/><stop offset="100%" stop-color="#0066ff" stop-opacity="0"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="1.5"/></filter>
<filter id="bigGlow"><feGaussianBlur stdDeviation="20"/></filter>
<filter id="frostBlur"><feGaussianBlur stdDeviation="3"/></filter>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>

<!-- Cool ambient glow -->
<ellipse cx="300" cy="200" rx="300" ry="180" fill="#00aaff" opacity="0.07" filter="url(#bigGlow)"/>

<!-- Cold air flow (decorative background) -->
<g opacity="0.2" filter="url(#frostBlur)">
  <path d="M 100 200 Q 200 180 300 200 T 500 200" stroke="#00aaff" stroke-width="2" fill="none"/>
  <path d="M 100 220 Q 200 240 300 220 T 500 220" stroke="#00ccff" stroke-width="2" fill="none"/>
  <path d="M 100 240 Q 200 220 300 240 T 500 240" stroke="#0088ff" stroke-width="2" fill="none"/>
</g>

<!-- Floor reflection -->
<ellipse cx="300" cy="370" rx="240" ry="20" fill="#00aaff" opacity="0.15" filter="url(#bigGlow)"/>

<!-- Server rack on left (being cooled) -->
<g opacity="0.75">
  <rect x="70" y="100" width="110" height="250" rx="3" fill="#141a2e" stroke="#2a3450" stroke-width="1"/>
  <rect x="76" y="106" width="98" height="238" rx="2" fill="#0a0e1a"/>
  <!-- Servers inside -->
  <g fill="#0c1228">
    <rect x="80" y="112" width="90" height="10" rx="0.5"/><rect x="80" y="126" width="90" height="10" rx="0.5"/>
    <rect x="80" y="140" width="90" height="16" rx="0.5"/><rect x="80" y="160" width="90" height="16" rx="0.5"/>
    <rect x="80" y="180" width="90" height="10" rx="0.5"/><rect x="80" y="194" width="90" height="10" rx="0.5"/>
    <rect x="80" y="208" width="90" height="20" rx="0.5"/><rect x="80" y="232" width="90" height="10" rx="0.5"/>
    <rect x="80" y="246" width="90" height="16" rx="0.5"/><rect x="80" y="266" width="90" height="10" rx="0.5"/>
    <rect x="80" y="280" width="90" height="16" rx="0.5"/><rect x="80" y="300" width="90" height="10" rx="0.5"/>
    <rect x="80" y="314" width="90" height="26" rx="0.5"/>
  </g>
  <rect x="80" y="112" width="90" height="1" fill="#0088ff" filter="url(#glow)"/>
  <rect x="80" y="160" width="90" height="1" fill="#00aaff" filter="url(#glow)"/>
  <rect x="80" y="208" width="90" height="1" fill="#0066ff" filter="url(#glow)"/>
  <rect x="80" y="280" width="90" height="1" fill="#00ccff" filter="url(#glow)"/>
  <circle cx="166" cy="116" r="1" fill="#00ff88"/>
  <circle cx="166" cy="164" r="1" fill="#0088ff"/>
  <circle cx="166" cy="212" r="1" fill="#ff6600"/>
</g>

<!-- Main cooling unit in center (in-row cooler) -->
<g>
  <!-- Top -->
  <rect x="220" y="72" width="160" height="16" rx="2" fill="#1a2236" stroke="#3a4868" stroke-width="0.5"/>
  
  <!-- Main body -->
  <rect x="225" y="86" width="150" height="270" rx="3" fill="url(#unit)" stroke="#4a5878" stroke-width="1"/>
  
  <!-- Top display panel -->
  <rect x="235" y="96" width="130" height="45" rx="2" fill="#0a0e1a" stroke="#2a3450" stroke-width="0.5"/>
  <!-- Digital display -->
  <rect x="245" y="104" width="110" height="28" rx="1" fill="#001528" stroke="#0066aa" stroke-width="0.5"/>
  <text x="300" y="118" font-family="monospace" font-size="10" text-anchor="middle" fill="#00ccff" filter="url(#glow)">21.5°C</text>
  <text x="300" y="128" font-family="monospace" font-size="5" text-anchor="middle" fill="#0088ff">COOLING · OK</text>
  
  <!-- Vent grille (large frontal intake) -->
  <rect x="235" y="150" width="130" height="150" rx="2" fill="#0a0e1a" stroke="#2a3450" stroke-width="0.5"/>
  
  <!-- Horizontal louvers (blades of vent) -->
  <g stroke="#2a3450" stroke-width="0.4" fill="#080c18">
    <rect x="240" y="156" width="120" height="3" rx="0.5"/>
    <rect x="240" y="163" width="120" height="3" rx="0.5"/>
    <rect x="240" y="170" width="120" height="3" rx="0.5"/>
    <rect x="240" y="177" width="120" height="3" rx="0.5"/>
    <rect x="240" y="184" width="120" height="3" rx="0.5"/>
    <rect x="240" y="191" width="120" height="3" rx="0.5"/>
    <rect x="240" y="198" width="120" height="3" rx="0.5"/>
    <rect x="240" y="205" width="120" height="3" rx="0.5"/>
    <rect x="240" y="212" width="120" height="3" rx="0.5"/>
    <rect x="240" y="219" width="120" height="3" rx="0.5"/>
    <rect x="240" y="226" width="120" height="3" rx="0.5"/>
    <rect x="240" y="233" width="120" height="3" rx="0.5"/>
    <rect x="240" y="240" width="120" height="3" rx="0.5"/>
    <rect x="240" y="247" width="120" height="3" rx="0.5"/>
    <rect x="240" y="254" width="120" height="3" rx="0.5"/>
    <rect x="240" y="261" width="120" height="3" rx="0.5"/>
    <rect x="240" y="268" width="120" height="3" rx="0.5"/>
    <rect x="240" y="275" width="120" height="3" rx="0.5"/>
    <rect x="240" y="282" width="120" height="3" rx="0.5"/>
    <rect x="240" y="289" width="120" height="3" rx="0.5"/>
    <rect x="240" y="296" width="120" height="2" rx="0.5"/>
  </g>
  
  <!-- Cold air emanating from vent (vertical strips) -->
  <g opacity="0.5">
    <rect x="250" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="260" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="270" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="280" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="290" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="300" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="310" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="320" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="330" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="340" y="300" width="4" height="45" fill="url(#cold)"/>
    <rect x="350" y="300" width="4" height="45" fill="url(#cold)"/>
  </g>
  
  <!-- Bottom control panel -->
  <rect x="235" y="310" width="130" height="38" rx="2" fill="#151c30" stroke="#2a3450" stroke-width="0.5"/>
  <circle cx="248" cy="324" r="3" fill="#00ff88" filter="url(#glow)"/>
  <text x="258" y="327" font-family="monospace" font-size="5" fill="#6a7a9a">RUN</text>
  <circle cx="280" cy="324" r="3" fill="#00aaff" filter="url(#glow)"/>
  <text x="290" y="327" font-family="monospace" font-size="5" fill="#6a7a9a">COOL</text>
  <circle cx="320" cy="324" r="3" fill="#0066ff" filter="url(#glow)"/>
  <text x="330" y="327" font-family="monospace" font-size="5" fill="#6a7a9a">NET</text>
  <!-- Control buttons -->
  <rect x="250" y="335" width="10" height="8" rx="1" fill="#2a3450" stroke="#4a5878" stroke-width="0.3"/>
  <rect x="265" y="335" width="10" height="8" rx="1" fill="#2a3450" stroke="#4a5878" stroke-width="0.3"/>
  <rect x="280" y="335" width="10" height="8" rx="1" fill="#2a3450" stroke="#4a5878" stroke-width="0.3"/>
  <rect x="330" y="335" width="30" height="8" rx="1" fill="#0066ff" opacity="0.4" stroke="#0088ff" stroke-width="0.3"/>
  
  <!-- Top LED strip -->
  <rect x="225" y="86" width="150" height="2" fill="#00aaff" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Brand strip -->
  <rect x="235" y="142" width="50" height="5" rx="0.5" fill="#E8500A" opacity="0.2"/>
</g>

<!-- Server rack on right (being cooled) -->
<g opacity="0.75">
  <rect x="420" y="100" width="110" height="250" rx="3" fill="#141a2e" stroke="#2a3450" stroke-width="1"/>
  <rect x="426" y="106" width="98" height="238" rx="2" fill="#0a0e1a"/>
  <g fill="#0c1228">
    <rect x="430" y="112" width="90" height="16" rx="0.5"/><rect x="430" y="132" width="90" height="10" rx="0.5"/>
    <rect x="430" y="146" width="90" height="10" rx="0.5"/><rect x="430" y="160" width="90" height="20" rx="0.5"/>
    <rect x="430" y="184" width="90" height="10" rx="0.5"/><rect x="430" y="198" width="90" height="16" rx="0.5"/>
    <rect x="430" y="218" width="90" height="10" rx="0.5"/><rect x="430" y="232" width="90" height="16" rx="0.5"/>
    <rect x="430" y="252" width="90" height="10" rx="0.5"/><rect x="430" y="266" width="90" height="20" rx="0.5"/>
    <rect x="430" y="290" width="90" height="10" rx="0.5"/><rect x="430" y="304" width="90" height="16" rx="0.5"/>
    <rect x="430" y="324" width="90" height="16" rx="0.5"/>
  </g>
  <rect x="430" y="112" width="90" height="1" fill="#00ccff" filter="url(#glow)"/>
  <rect x="430" y="160" width="90" height="1" fill="#0088ff" filter="url(#glow)"/>
  <rect x="430" y="232" width="90" height="1" fill="#00aaff" filter="url(#glow)"/>
  <rect x="430" y="304" width="90" height="1" fill="#0066ff" filter="url(#glow)"/>
  <circle cx="516" cy="116" r="1" fill="#00ff88"/>
  <circle cx="516" cy="164" r="1" fill="#00ff88"/>
  <circle cx="516" cy="236" r="1" fill="#0088ff"/>
</g>

<!-- Cold air flow arrows (left side - air going INTO server) -->
<g opacity="0.4" stroke="#00aaff" stroke-width="1" fill="none">
  <path d="M 230 180 Q 205 180 185 180" stroke-dasharray="3 3"/>
  <polygon points="185,180 190,177 190,183" fill="#00aaff"/>
  <path d="M 230 220 Q 205 220 185 220" stroke-dasharray="3 3"/>
  <polygon points="185,220 190,217 190,223" fill="#00aaff"/>
  <path d="M 230 260 Q 205 260 185 260" stroke-dasharray="3 3"/>
  <polygon points="185,260 190,257 190,263" fill="#00aaff"/>
</g>

<!-- Cold air flow arrows (right side) -->
<g opacity="0.4" stroke="#00aaff" stroke-width="1" fill="none">
  <path d="M 375 180 Q 400 180 420 180" stroke-dasharray="3 3"/>
  <polygon points="420,180 415,177 415,183" fill="#00aaff"/>
  <path d="M 375 220 Q 400 220 420 220" stroke-dasharray="3 3"/>
  <polygon points="420,220 415,217 415,223" fill="#00aaff"/>
  <path d="M 375 260 Q 400 260 420 260" stroke-dasharray="3 3"/>
  <polygon points="420,260 415,257 415,263" fill="#00aaff"/>
</g>
</svg>
