<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f1525"/><stop offset="100%" stop-color="#0a0e1a"/></linearGradient>
<linearGradient id="cab" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2a3550"/><stop offset="50%" stop-color="#3a4868"/><stop offset="100%" stop-color="#1e2840"/></linearGradient>
<linearGradient id="cabDark" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#1a2236"/><stop offset="50%" stop-color="#263150"/><stop offset="100%" stop-color="#141b2e"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
<filter id="bigGlow"><feGaussianBlur stdDeviation="20"/></filter>
</defs>
<rect width="600" height="400" fill="url(#bg)"/>
<!-- Floor reflection -->
<ellipse cx="300" cy="370" rx="260" ry="25" fill="#0066cc" opacity="0.1" filter="url(#bigGlow)"/>
<!-- Perspective floor lines -->
<g opacity="0.1" stroke="#445577" stroke-width="0.5">
  <line x1="300" y1="340" x2="100" y2="400"/><line x1="300" y1="340" x2="200" y2="400"/>
  <line x1="300" y1="340" x2="400" y2="400"/><line x1="300" y1="340" x2="500" y2="400"/>
</g>

<!-- Left cabinet (perspective, smaller) -->
<g opacity="0.55">
  <rect x="80" y="90" width="100" height="250" rx="3" fill="url(#cabDark)" stroke="#223050" stroke-width="1"/>
  <rect x="86" y="96" width="88" height="238" rx="2" fill="#0c1122"/>
  <!-- Door vents/grille lines -->
  <g stroke="#1a2540" stroke-width="0.5" fill="none">
    <line x1="92" y1="115" x2="168" y2="115"/><line x1="92" y1="125" x2="168" y2="125"/>
    <line x1="92" y1="135" x2="168" y2="135"/><line x1="92" y1="145" x2="168" y2="145"/>
    <line x1="92" y1="235" x2="168" y2="235"/><line x1="92" y1="245" x2="168" y2="245"/>
    <line x1="92" y1="255" x2="168" y2="255"/><line x1="92" y1="265" x2="168" y2="265"/>
  </g>
  <!-- Handle -->
  <rect x="155" y="200" width="8" height="22" rx="1" fill="#4a5878"/>
  <!-- Small LED -->
  <circle cx="94" cy="102" r="1.5" fill="#00ff88" filter="url(#glow)"/>
</g>

<!-- Main central cabinet (VX25 / TS8 / WZ style) -->
<g>
  <!-- Top hood -->
  <rect x="195" y="62" width="210" height="14" rx="2" fill="#2a3450" stroke="#3a4868" stroke-width="0.5"/>
  <!-- Body -->
  <rect x="200" y="75" width="200" height="275" rx="4" fill="url(#cab)" stroke="#4a5878" stroke-width="1"/>
  <!-- Door inner -->
  <rect x="210" y="85" width="180" height="255" rx="2" fill="#1a2236" stroke="#0f1525" stroke-width="0.5"/>
  
  <!-- Door ventilation grille (top) -->
  <g stroke="#0a0e1a" stroke-width="0.5" fill="#0f1525">
    <rect x="225" y="95" width="150" height="28" rx="1"/>
    <line x1="225" y1="100" x2="375" y2="100" stroke="#2a3450"/>
    <line x1="225" y1="106" x2="375" y2="106" stroke="#2a3450"/>
    <line x1="225" y1="112" x2="375" y2="112" stroke="#2a3450"/>
    <line x1="225" y1="118" x2="375" y2="118" stroke="#2a3450"/>
  </g>
  
  <!-- Door panel (middle area — brand plate) -->
  <rect x="225" y="135" width="150" height="60" rx="1" fill="#151c30" stroke="#2a3450" stroke-width="0.5"/>
  <!-- Brand plate accent -->
  <rect x="235" y="158" width="40" height="14" rx="1" fill="#E8500A" opacity="0.9"/>
  <rect x="235" y="176" width="80" height="2" rx="0.5" fill="#4a5878" opacity="0.5"/>
  <rect x="235" y="181" width="60" height="2" rx="0.5" fill="#4a5878" opacity="0.3"/>
  
  <!-- Ventilation grille (bottom) -->
  <g stroke="#0a0e1a" stroke-width="0.5" fill="#0f1525">
    <rect x="225" y="210" width="150" height="40" rx="1"/>
    <line x1="225" y1="216" x2="375" y2="216" stroke="#2a3450"/>
    <line x1="225" y1="222" x2="375" y2="222" stroke="#2a3450"/>
    <line x1="225" y1="228" x2="375" y2="228" stroke="#2a3450"/>
    <line x1="225" y1="234" x2="375" y2="234" stroke="#2a3450"/>
    <line x1="225" y1="240" x2="375" y2="240" stroke="#2a3450"/>
  </g>
  
  <!-- Lock cylinder -->
  <circle cx="370" cy="215" r="4" fill="#3a4868" stroke="#5a6a8a" stroke-width="0.5"/>
  <circle cx="370" cy="215" r="1.5" fill="#1a2236"/>
  
  <!-- Handle -->
  <rect x="358" y="235" width="16" height="45" rx="2" fill="#5a6a8a" stroke="#7a8aaa" stroke-width="0.5"/>
  <rect x="362" y="242" width="8" height="31" rx="1" fill="#2a3550"/>
  
  <!-- LED indicator panel -->
  <rect x="225" y="263" width="150" height="20" rx="1" fill="#0a0e1a"/>
  <circle cx="235" cy="273" r="2" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="248" cy="273" r="2" fill="#00aaff" filter="url(#glow)"/>
  <circle cx="261" cy="273" r="2" fill="#ff6600" filter="url(#glow)"/>
  <text x="280" y="277" font-family="monospace" font-size="8" fill="#4a5878">STATUS: ONLINE</text>
  
  <!-- Bottom vents -->
  <rect x="225" y="292" width="150" height="38" rx="1" fill="#0f1525" stroke="#2a3450" stroke-width="0.5"/>
  <g stroke="#2a3450" stroke-width="0.5">
    <line x1="225" y1="298" x2="375" y2="298"/>
    <line x1="225" y1="304" x2="375" y2="304"/>
    <line x1="225" y1="310" x2="375" y2="310"/>
    <line x1="225" y1="316" x2="375" y2="316"/>
    <line x1="225" y1="322" x2="375" y2="322"/>
  </g>
  
  <!-- Base/plinth -->
  <rect x="205" y="340" width="190" height="14" rx="1" fill="#1a2236" stroke="#2a3450" stroke-width="0.5"/>
  
  <!-- Top branding line (subtle blue LED) -->
  <rect x="200" y="75" width="200" height="2" fill="#0066ff" opacity="0.4" filter="url(#glow)"/>
</g>

<!-- Right cabinet (perspective, smaller) -->
<g opacity="0.55">
  <rect x="420" y="90" width="100" height="250" rx="3" fill="url(#cabDark)" stroke="#223050" stroke-width="1"/>
  <rect x="426" y="96" width="88" height="238" rx="2" fill="#0c1122"/>
  <g stroke="#1a2540" stroke-width="0.5" fill="none">
    <line x1="432" y1="115" x2="508" y2="115"/><line x1="432" y1="125" x2="508" y2="125"/>
    <line x1="432" y1="135" x2="508" y2="135"/><line x1="432" y1="145" x2="508" y2="145"/>
    <line x1="432" y1="235" x2="508" y2="235"/><line x1="432" y1="245" x2="508" y2="245"/>
    <line x1="432" y1="255" x2="508" y2="255"/><line x1="432" y1="265" x2="508" y2="265"/>
  </g>
  <rect x="437" y="200" width="8" height="22" rx="1" fill="#4a5878"/>
  <circle cx="506" cy="102" r="1.5" fill="#0088ff" filter="url(#glow)"/>
</g>

<!-- Ambient light from top -->
<ellipse cx="300" cy="40" rx="200" ry="40" fill="#0066ff" opacity="0.08" filter="url(#bigGlow)"/>
</svg>
